<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="16" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#62a0ea"/>
      <stop offset="55%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1a5fb4"/>
    </linearGradient>
    <linearGradient id="shine" x1="64" y1="10" x2="64" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App icon squircle (GNOME / libadwaita blue) -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#shine)"/>

  <!--
    Systemd Hub mark (simple, readable at small sizes):
    gear  = systemd services / system machinery
    ring  = control hub
    core  = managed unit
  -->
  <g transform="translate(64 64)" fill="#ffffff">
    <!-- 8 gear teeth -->
    <rect x="-7" y="-42" width="14" height="20" rx="4"/>
    <rect x="-7" y="-42" width="14" height="20" rx="4" transform="rotate(45)"/>
    <rect x="-7" y="-42" width="14" height="20" rx="4" transform="rotate(90)"/>
    <rect x="-7" y="-42" width="14" height="20" rx="4" transform="rotate(135)"/>
    <rect x="-7" y="-42" width="14" height="20" rx="4" transform="rotate(180)"/>
    <rect x="-7" y="-42" width="14" height="20" rx="4" transform="rotate(225)"/>
    <rect x="-7" y="-42" width="14" height="20" rx="4" transform="rotate(270)"/>
    <rect x="-7" y="-42" width="14" height="20" rx="4" transform="rotate(315)"/>

    <!-- Gear body -->
    <circle r="28"/>
    <!-- Hub ring (cutout using mid Adwaita blue for crisp contrast) -->
    <circle r="16" fill="#1c71d8"/>
    <!-- Hub core -->
    <circle r="8"/>
  </g>
</svg>
